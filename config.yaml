name: "Page Bank"
app_id: "app-pagebank"
version: "1.0"
database: app-pagebank
rest: true

schemas:
  - schemas/schema.graphql

resources:
  - resources/*.rs

static_files:
  path: web
  route: /
  index: index.html
  notFound:
    file: index.html
    statusCode: 200
  build:
    sourceDir: source
    command: npm run build

env:
  PAGEBANK_ORIGIN_URL: "https://www.example.com"
